				const prevButton = document.querySelector(".carousel-prev-xz12b3");
				const nextButton = document.querySelector(".carousel-next-xz12b3");
				let index = 0;
				const items = document.querySelectorAll(".carousel-item-xz12b3");
				
				function update() { track.style.transform = `translateX(-${index * 100}%)`; }
